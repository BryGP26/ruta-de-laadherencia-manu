<header>
    <div class="logo-area" style="display: flex; align-items: center; gap: 12px;">
        <img src="logo-manu.png" alt="Logo Asociación MANU" style="height: 55px; width: auto; object-fit: contain;">
        <div>
            <h1>ASOCIACIÓN MANU</h1>
            <span>La Ruta de la Adherencia (RATM) • Monitoreo de Habitantes</span>
        </div>
    </div>
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
        <div class="user-badge">
            <i class="material-icons" style="font-size: 1.2rem;">verified_user</i> 
            <span id="lblTipoUsuario">Cargando...</span>
        </div>
        <button id="btnExportarExcel" class="btn-excel admin-only" onclick="exportarDataHabitantesExcel()">
            <i class="material-icons" style="font-size: 1.1rem;">file_download</i> <span>Guardar Data (Carpetas)</span>
        </button>
        <button id="btnToggleView" class="btn-toggle-view admin-only" onclick="alternarVistaExpress()">
            <i class="material-icons" style="font-size: 1.1rem;">visibility</i> <span>Cambiar a Vista Usuario</span>
        </button>
        <button id="btnRefreshData" class="btn-refresh" onclick="refreshSystemData()"><i class="material-icons" style="font-size:1rem;">sync</i> Refrescar</button>
        <button class="btn-logout" id="btnCerrarSesion"><i class="material-icons" style="font-size:1.1rem;">power_settings_new</i> Salir</button>
    </div>
</header>
